version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trading_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-trading_db}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - trading_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-trading_db}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
      APP_ENV: ${APP_ENV:-development}
      SMTP_HOST: ${SMTP_HOST:-server.minpay.in}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-info@minpay.in}
      SMTP_PASS: ${SMTP_PASS}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-info@minpay.in}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      BROKER_TYPE: ${BROKER_TYPE:-paper}
      ZERODHA_API_KEY: ${ZERODHA_API_KEY:-}
      ZERODHA_API_SECRET: ${ZERODHA_API_SECRET:-}
    volumes:
      - ./data/logs:/app/logs
    networks:
      - trading_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://217.217.248.72:8080/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://217.217.248.72:8080/api/ws}
    container_name: trading_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - trading_network

  nginx:
    image: nginx:1.25-alpine
    container_name: trading_nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - trading_network

networks:
  trading_network:
    driver: bridge
